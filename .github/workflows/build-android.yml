name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'AndroidApp/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'AndroidApp/**'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AndroidApp/package-lock.json

      # ── 3. Java (required by Gradle) ───────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install JS deps ─────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: AndroidApp

      # ── 6. Build web assets ────────────────────────────────────
      - name: Build web (Vite)
        run: npm run build
        working-directory: AndroidApp

      # ── 7. Sync Capacitor → Android ────────────────────────────
      - name: Clean stale web assets before sync
        run: rm -rf android/app/src/main/assets/public
        working-directory: AndroidApp

      - name: Capacitor sync
        run: npx cap sync android
        working-directory: AndroidApp

      # ── 8. Make gradlew executable ─────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: AndroidApp/android

      # ── 9. Cache Gradle ────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('AndroidApp/android/**/*.gradle*', 'AndroidApp/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Build debug APK ────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: AndroidApp/android

      # ── 11. Upload APK artifact ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aether-radio-debug-${{ github.run_number }}
          path: AndroidApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
