name: Release Android APK

on:
  push:
    tags:
      - 'v*'           # triggers on tags like v1.0.0, v1.2.3
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AndroidApp/package-lock.json

      # ── 3. Java ────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install JS deps ─────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: AndroidApp

      # ── 6. Build web assets ────────────────────────────────────
      - name: Build web (Vite)
        run: npm run build
        working-directory: AndroidApp

      # ── 7. Sync Capacitor → Android ────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android
        working-directory: AndroidApp

      # ── 8. Make gradlew executable ─────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: AndroidApp/android

      # ── 9. Cache Gradle ────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('AndroidApp/android/**/*.gradle*', 'AndroidApp/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Decode keystore from secret ────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > AndroidApp/android/app/release.keystore

      # ── 11. Build release APK ──────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: AndroidApp/android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 12. Upload signed APK ──────────────────────────────────
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: aether-radio-release-${{ github.ref_name }}
          path: AndroidApp/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── 13. Create GitHub Release ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AndroidApp/android/app/build/outputs/apk/release/app-release.apk
          name: Aether Radio ${{ github.ref_name }}
          body: |
            ## Aether Radio ${{ github.ref_name }}
            
            ### Download
            Install `app-release.apk` on your Android device (Android 7.0+).
            
            > Enable "Install from unknown sources" in your device settings if needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
