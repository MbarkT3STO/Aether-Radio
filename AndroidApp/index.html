<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#121214">
  <title>Aether Radio</title>
  <link rel="stylesheet" href="./src/renderer/styles/fonts.css">
  <link rel="stylesheet" href="./src/renderer/styles/tokens.css">
  <link rel="stylesheet" href="./src/renderer/styles/reset.css">
  <link rel="stylesheet" href="./src/renderer/styles/typography.css">
  <link rel="stylesheet" href="./src/renderer/styles/animations.css">
  <link rel="stylesheet" href="./src/renderer/styles/app.css">
</head>
<body>
  <div id="app">
    <div class="app-content" id="content"></div>
    <div class="app-mini-player" id="mini-player"></div>
    <div class="app-bottom-nav" id="bottom-nav"></div>
  </div>
  <script type="module" src="./src/renderer/index.ts"></script>
  <script>
    // Fix 100vh on Android — address bar changes viewport height.
    // Set --vh to the actual inner height so layout.css can use it.
    function setVh() {
      document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
    }
    setVh();
    window.addEventListener('resize', setVh);
  </script>
</body>
</html>
