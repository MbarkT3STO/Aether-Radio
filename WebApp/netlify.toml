[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — hash router still works, but this covers direct deep links
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Audio stream proxy — Edge Function (no timeout, streams bytes through)
[[edge_functions]]
  path = "/api/stream"
  function = "stream-proxy"

# Shazam API proxy — regular serverless Function (single small POST)
[[edge_functions]]
  path = "/api/shazam"
  function = "shazam-proxy"

# ── Asset caching ──────────────────────────────────────────────────────────
# Every file under /assets/ is content-hashed by Vite, so we can safely
# mark them immutable and cache them for a year.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must not be cached — it's the entry point that references the
# hashed assets. A stale HTML would reference assets that no longer exist.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# favicon — short-ish cache
[[headers]]
  for = "/favicon.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
