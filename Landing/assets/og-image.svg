<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050510"/>
      <stop offset="1" stop-color="#0b0b1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset=".5" stop-color="#5E5CE6"/>
      <stop offset="1" stop-color="#BF5AF2"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#64D2FF"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <g filter="url(#blur)" opacity=".55">
    <circle cx="260"  cy="120" r="220" fill="#0A84FF"/>
    <circle cx="1020" cy="520" r="260" fill="#BF5AF2"/>
    <circle cx="900"  cy="120" r="180" fill="#63E6E2" opacity=".7"/>
  </g>

  <!-- Mark -->
  <g transform="translate(80, 90)">
    <rect width="110" height="110" rx="28" fill="url(#mark)"/>
    <path d="M27 72c8.4-14 18.2-14 28-14s19.6 0 28 14" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none" opacity=".85"/>
    <path d="M36 56c6-9 12.6-9 19.3-9s13.3 0 19.3 9" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none" opacity=".6"/>
    <circle cx="55" cy="75" r="7" fill="#fff"/>
  </g>

  <text x="210" y="155" fill="rgba(255,255,255,0.6)" font-family="SF Pro Display, Inter, sans-serif" font-size="28" font-weight="600" letter-spacing="3">AETHER RADIO</text>

  <!-- Main headline -->
  <text x="80" y="320" fill="#FFFFFF" font-family="SF Pro Display, Inter, sans-serif" font-size="110" font-weight="900" letter-spacing="-4">Tune into</text>
  <text x="80" y="430" fill="#FFFFFF" font-family="SF Pro Display, Inter, sans-serif" font-size="110" font-weight="900" letter-spacing="-4">the world.</text>

  <text x="80" y="530" fill="url(#accent)" font-family="SF Pro Display, Inter, sans-serif" font-size="110" font-weight="900" letter-spacing="-4" font-style="italic">Beautifully.</text>

  <!-- Subtitle -->
  <text x="80" y="590" fill="rgba(255,255,255,0.7)" font-family="SF Pro Text, Inter, sans-serif" font-size="28" font-weight="500">
    50,000+ live stations · Android · macOS · Windows · Linux · Free & open source
  </text>
</svg>
